<title>Onboarding — Yarzin Sella</title>
<style>

  body { font-family: 'Segoe UI', Arial, sans-serif; background: #FDFFFD; color: #28282B; direction: ltr; min-height: 100vh; }

  header {
    background: #FDFFFD;
    border-bottom: 2px solid #AEBF7E;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header .logo-block h1 { font-size: 26px; font-weight: 700; color: #28282B; }
  header .logo-block p { font-size: 15px; color: #28282B; margin-top: 3px; }

  .role-tabs {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .role-tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1.5px solid #D8DDD4;
    background: #FDFFFD;
    font-size: 15px;
    font-weight: 600;
    color: #5A6845;
    cursor: pointer;
    transition: all 0.15s;
  }
  .role-tab:hover { background: #F5F7F2; border-color: #AEBF7E; }
  .role-tab.active { background: #AEBF7E; border-color: #AEBF7E; color: #28282B; }

  .progress-bar-wrap {
    background: #F5F7F2;
    border-bottom: 1px solid #E5E4E2;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-label { font-size: 14px; color: #28282B; font-weight: 500; white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 7px; background: #D8DDD4; border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #AEBF7E; border-radius: 4px; transition: width 0.4s ease; }
  .progress-count { font-size: 14px; color: #28282B; font-weight: 600; white-space: nowrap; }

  main { max-width: 860px; margin: 0 auto; padding: 32px 24px 60px; }

  .section-card {
    background: #FDFFFD;
    border: 1px solid #D8DDD4;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .section-card:hover { box-shadow: 0 2px 12px rgba(40,40,43,0.07); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; cursor: pointer; user-select: none; gap: 12px;
  }
  .section-header:hover { background: #F5F7F2; }

  .section-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .section-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .section-title { font-size: 17px; font-weight: 700; color: #28282B; }
  .section-meta { font-size: 13px; color: #5A6845; margin-top: 2px; font-weight: 500; }

  .section-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .section-progress-pill { font-size: 13px; color: #3a4a28; background: #DEEAB8; border-radius: 20px; padding: 4px 12px; font-weight: 600; white-space: nowrap; }
  .chevron { font-size: 22px; color: #5A6845; transition: transform 0.2s; line-height: 1; }
  .section-card.open .chevron { transform: rotate(180deg); }

  .section-body { display: none; border-top: 1px solid #E5E4E2; }
  .section-card.open .section-body { display: block; }

  .item-row {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 18px 24px; border-bottom: 1px solid #F0F0EE;
    transition: background 0.1s; cursor: pointer;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #F9FAF8; }

  .checkbox-wrap { flex-shrink: 0; margin-top: 3px; }
  .checkbox-wrap input[type="checkbox"] { width: 20px; height: 20px; accent-color: #AEBF7E; cursor: pointer; }

  .item-content { flex: 1; min-width: 0; }
  .item-name { font-size: 16px; font-weight: 600; color: #28282B; line-height: 1.5; }
  .item-row.checked .item-name { text-decoration: line-through; color: #999; }

  .item-expand-btn {
    font-size: 13px; color: #5A6845; background: none; border: none;
    cursor: pointer; padding: 0; margin-top: 6px;
    display: inline-flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .item-expand-btn:hover { color: #28282B; }

  .item-details { display: none; margin-top: 14px; }
  .item-details.open { display: block; }

  .detail-block {
    background: #F5F7F2; border: 1px solid #D8DDD4; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px;
    font-size: 15px; line-height: 1.75; color: #28282B;
  }
  .detail-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; color: #5A6845; }

  .detail-question-block {
    background: #FFFBF0; border: 1px solid #EEA11F;
    border-left: 3px solid #EEA11F; border-radius: 6px;
    padding: 12px 16px; margin-bottom: 10px;
    font-size: 15px; color: #28282B; line-height: 1.7;
  }
  .detail-question-block .detail-label { color: #B07A10; }

  .detail-relevance-block {
    background: #EEF5FF; border: 1px solid #B8D0F0;
    border-left: 3px solid #4A86C8; border-radius: 6px;
    padding: 12px 16px; margin-bottom: 10px;
    font-size: 15px; color: #28282B; line-height: 1.7;
  }
  .detail-relevance-block .detail-label { color: #2A5A9A; }

  .detail-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: #28282B; font-size: 14px; font-weight: 600;
    text-decoration: none; border-bottom: 1px solid #AEBF7E;
  }
  .detail-link:hover { color: #5A6845; }

  @media (max-width: 600px) {
    header { padding: 20px 16px; }
    .role-tabs { flex-wrap: wrap; }
    main { padding: 20px 12px 40px; }
    .section-header { padding: 16px; }
    .item-row { padding: 16px; }
  }
</style>

      { name: "Client KPIs", how: "Review the KPI scorecard with the direct manager; map the top 3 culinary-related KPIs and their current scores.", relevance: "Both Google and Meta track vendor performance formally. Head Chef must know the targets before their first service.", question: null, source: "Meta SOP §12 Client KPIs; Google Account Handbook – QA targets" },
      { name: "Account Structure, POC & Services", how: "Review the account structure with the Account Manager; map the client contacts relevant to culinary operations and the YS org chart.", relevance: "Knowing who to contact on the client side — and for what — prevents delays and miscommunication when issues arise.", question: "Who is the primary culinary contact on the client side for this account?", source: "Google Handbook pp.5 – Key Contacts; Meta SOP §2.2 Key Contacts" },
      { name: "Client Learning Portal Training", how: "Complete all required client platform training modules.", relevance: "Both Google and Meta require vendor staff to complete platform-specific training. Incomplete certifications are a compliance risk.", question: null, source: null },
      { name: "Client Internal Platform Tools — Meeting & Calendar Tool", how: "Learn to use the client's internal calendar and meeting tool.", relevance: "Used for advance planning of catering requests and special service days.", question: null, source: null },
      { name: "Client Internal Platform Tools — Visitor Tool", how: "Learn to use the client's visitor management tool.", relevance: "External visitor events may require tailored menus or stricter allergen documentation.", question: null, source: null },
      { name: "Client Internal Platform Tools — Outlook", how: "Set up and use Outlook for client communications.", relevance: "Client stakeholders communicate via Outlook. Head Chef must be reachable through the correct channel.", question: null, source: null },
      { name: "Client Internal Platform Tools — Helpdesk", how: "Learn to submit Helpdesk tickets for facilities support.", relevance: "Kitchen equipment failures require Helpdesk tickets. Head Chef must be able to submit a ticket independently.", question: null, source: null },
      { name: "Client Internal Platform Tools — Request a Badge", how: "Learn the badge request process for new team members.", relevance: "All team members on site require valid badges. Head Chef is responsible for team-wide access management.", question: null, source: null },
      { name: "Events & Client Calendar", how: "Review the events calendar with the Events Manager; identify all upcoming catering requirements that need production planning.", relevance: "Head Chef must have visibility of the events pipeline to plan team capacity.", question: null, source: "Client calendar system; Google Handbook – Catering Experience; Meta SOP §5" },
      { name: "Meetings with Client — Different Stakeholders", how: "Attend the first client culinary or ops meeting as an observer alongside the direct manager; debrief immediately afterward.", relevance: "Head Chef may participate in regular client meetings. Observing first builds familiarity with format, tone, and client expectations.", question: "What is the meeting cadence for culinary reviews at this site, and who attends from the client side?", source: "Meta SOP §4 Communication Protocol; Google Handbook – Key Contacts" },
      { name: "Routine Account Reports — Monthly or Quarterly", how: "Review the last 2 account reports with the Account Manager; understand which culinary data the Head Chef must provide and by what deadline.", relevance: "Head Chef provides inputs to monthly and quarterly client reports.", question: null, source: "Meta SOP §4 – Recap Report; Google Handbook" },
      { name: "Internal Management Routines & Meetings", how: "Review the internal meeting calendar with the Site Manager; attend all recurring meetings for the first month.", relevance: "Internal meetings are where issues are escalated, priorities are set, and the Head Chef aligns with the broader operations team.", question: null, source: null }

  {
    id: "hc_menu_building", title: "Menu Building", titleHe: "Menu Building", icon: "📋", iconBg: "#EAF0F5",
    items: [
      { name: "How Menus Are Structured at the Account", how: "Walk through a completed monthly menu cycle — review how stations are organized, the hot/cold ratio, and how dietary streams (vegetarian, vegan, gluten-free) are integrated.", relevance: "The Head Chef is the architect of the daily menu. Before building anything, they must understand what a complete YS menu looks like — station by station, day by day.", question: "How many dishes per station per day is the standard for this account?", source: "Monthly menu files (shared drive); YS Culinary SOP – menu structure guidelines" },
      { name: "Decision-Making Process & Approvals", how: "Review the menu approval flow with the direct manager: who proposes, who reviews internally, who sends to the client, and what the client approval timeline looks like. Review the last 3 submitted menus with the Culinary Manager.", relevance: "Menu decisions are not unilateral. Head Chef must know exactly where their authority ends and where client or management approval is required before a dish goes on the line.", question: "Does the Head Chef have autonomy to change daily dishes, or is every change subject to client sign-off? What is the exact submission deadline for this site?", source: "Meta SOP §6 – menu approval process; Google Account Handbook – Food Program planning" },
      { name: "Dietary Requirements & Allergens", how: "Build a sample weekly menu in the template with the Culinary Manager, covering all required dietary streams and mapping allergens for each dish.", relevance: "Every menu must account for vegetarian, vegan, gluten-free, and other dietary needs — plus complete allergen mapping per dish. This is both a client expectation and a food safety obligation.", question: null, source: "Menu template with allergen mapping; Meta SOP §5.1.3; YS Allergen guidelines" },
      { name: "How the Rotation Calendar Is Planned & Maintained", how: "Map the current menu rotation calendar with the Culinary Manager — understand the cycle length, how variety is tracked across weeks, and how the calendar is updated when dishes change.", relevance: "Menus rotate daily. Without a managed rotation calendar, dishes repeat, variety drops, and client satisfaction scores fall. Head Chef owns this calendar.", question: "What is the current rotation cycle length — 4 weeks, 6 weeks?", source: "Menu rotation calendar (shared drive or Monday.com)" }
    ]

  {
    id: "hc_menu_innovation", title: "Menu Innovation", titleHe: "Menu Innovation", icon: "💡", iconBg: "#FFF3E0",
    items: [
      { name: "Innovation Process", how: "Review how new ideas have been introduced in the past: what has worked, what the client responds to, and what is coming up.", relevance: "Innovation does not happen by accident. Head Chef needs to understand the existing innovation pipeline — seasonal menus, themed days, new station concepts — and how to feed into it.", question: "What menu innovations have received the best client feedback in the past year?", source: "Previous WOW moments documentation; innovation log; direct manager" },
      { name: "Tools & Resources", how: "Review available resources with the Culinary Manager: food trend reports, supplier new product introductions, internal culinary research materials, and access to professional culinary databases.", relevance: "Head Chef cannot innovate in a vacuum. Knowing what research tools and product introduction channels exist is prerequisite to building a credible innovation pipeline.", question: "Does YS provide access to any culinary trend platforms or food research tools?", source: "Supplier NPI process; procurement supplier catalogue; Meta SOP §7" },
      { name: "KitchenSync & User-Facing Culinary Programmes", how: "Attend one KitchenSync or Team Build session as an observer; understand the facilitation format, what preparation the kitchen team needs to do, and what the client expects.", relevance: "Google's KitchenSync is a flagship client engagement programme led by Café Culinary Managers. Head Chef may be called to facilitate or contribute — high-visibility client moments.", question: "How frequently are KitchenSync or Team Build sessions scheduled at this account?", source: "Google Account Handbook – User-Facing Programmes p.7; KitchenSync session plan" }
    ]
  },
  {
    id: "hc_quality", title: "Quality & Standards", titleHe: "Quality & Standards", icon: "⭐", iconBg: "#EAF5F0",
    items: [
      { name: "Daily Food Safety Routine — Site Checklists & Forms", how: "The daily food safety touchpoints: when they happen, who is responsible, what is documented, and what happens if something is missed.", relevance: "Head Chef must internalize the daily food safety rhythm — temperature checks, FIFO rotation, allergen card review, cleaning schedule sign-off — so it becomes automatic, not reactive.", question: "Are all daily food safety tasks currently being completed consistently, or are there known compliance gaps?", source: "Daily site checklist (Monday.com); HACCP daily log; YS Food Safety SOP – daily tasks" },
      { name: "Weekly Food Safety Routine — Internal Audit & Team Follow-up", how: "Co-run the weekly internal audit for the first two weeks; understand how findings are documented, communicated to the team, and closed out before the next audit.", relevance: "The weekly audit is the Head Chef's primary self-monitoring tool. Running it consistently — and acting on findings — is what prevents a surprise result in an external audit.", question: null, source: "YS Internal Audit checklist; Monday.com audit board; corrective action log" },
      { name: "Monthly Food Safety Routine — Reporting, Lab Results & Trend Review", how: "Monthly food safety review with the Food Safety Manager: review lab test results, audit trend data, outstanding corrective actions, and what goes into the monthly report.", relevance: "Monthly review is where patterns become visible. Head Chef uses this to identify recurring issues, measure improvement, and prepare data required for client reporting.", question: "Is there a formal monthly food safety review meeting on this account, or is it embedded in a wider ops meeting?", source: "Monthly food safety report template; lab test results archive; Monday.com QA board" },
      { name: "Incident Response Routine — Site Specific", how: "Understand the specific stakeholders for your site and the exact response sequence — stop, contain, document, escalate.", relevance: "Head Chef is the first decision-maker in a food safety incident. Knowing the exact response sequence before it happens prevents panic-driven errors.", question: null, source: "YS Customer Complaint SOP; Non-Compliance Form; Food Safety Manager escalation protocol" },
      { name: "Culinary QA Audit — What It Covers & How It Is Scored", how: "Review the QA audit form with the Culinary Manager; walk through a completed audit from the last 3 months and understand how each criterion is scored.", relevance: "The QA audit is the formal measure of the Head Chef's culinary performance. Understanding exactly what is being assessed allows the team to be managed against the right standard.", question: null, source: "YS Culinary QA audit form; Monday.com QA board; Google / Meta QBR reports" },
      { name: "Plating & Presentation Standards", how: "Review the plating standards document and photo reference library with the Culinary Manager; then walk the service line during one lunch service to assess current practice against the standard.", relevance: "Presentation is a KPI, not an aesthetic preference. Both Google and Meta score food presentation formally. Head Chef enforces consistent plating across every station and every team member.", question: "Is there a photo reference library for this account's dishes, or does one need to be created?", source: "YS plating standards document; photo reference library; Meta SOP §5.1.1" },
      { name: "How Client Feedback on Food Quality Is Captured & Acted On", how: "Review the client feedback log with the direct manager; understand how feedback arrives, how it is documented, and what the expected response turnaround is.", relevance: "Client feedback is the external QA signal. Head Chef must have a systematic way to capture it, share it with the team, and demonstrate improvement.", question: null, source: "Client feedback log; Meta SOP §4 – Communication Protocol; account QBR reports" }
    ]
  },

      { name: "Specific Client Requirements on Food Safety — Policies & Reports", how: "Receive a dedicated briefing from the Food Safety Manager covering the client's food safety documentation requirements, inspection format, and reporting cadence.", relevance: "Client-specific requirements (Meta's allergen card format, Google's inspection scoring) override YS defaults where stricter. Head Chef must know these before their first service.", question: "What food safety reports must be submitted to this client, and on what schedule?", source: null },

      { name: "Documentation Forms", how: "Review all required documentation forms (temperature logs, cleaning records, receiving forms).", relevance: "Head Chef verifies the team fills them in accurately.", question: null, source: "https://yarzinsella-team.monday.com/boards/1339765862" },
      { name: "Licence — What Is Allowed and Prohibited on Site", how: "Review the site operating licence with the Site Manager; discuss any constraints that directly affect menu planning or production methods.", relevance: "The licence defines legal limits on what can be cooked, sold, or served on site. Must be understood before finalizing any new menu item.", question: "Are there any licence constraints that currently limit what can be produced on this site?", source: null },

      { name: "Shelf Life After Opening — Product List", how: "Review the product shelf life list for all opened products.", relevance: "Knowing exactly how long each opened product is safe prevents both food safety incidents and unnecessary waste.", question: null, source: null },

      { name: "Health Declaration", how: "Review the process for collecting declarations from all team members and where they are stored.", relevance: "Health declarations are required for all food handlers. Head Chef is responsible for team-wide compliance and for managing declarations for new joiners.", question: null, source: "https://yarzinsella-team.monday.com/boards/1347415707/views/9740925" },
      { name: "Internal Audit — Weekly", how: "Review the audit. Ensure access and know where it is located. Only the site manager or site chef are authorized to conduct the audit.", relevance: null, question: null, source: "https://yarzinsella-team.monday.com/boards/1539265987" },
      { name: "Food Safety Training", how: "Complete all food safety training requirements.", relevance: null, question: null, source: null },
      { name: "Food Safety QA", how: "Review QA process and standards.", relevance: null, question: null, source: null }

      { name: "Site Finance Reports", how: "Review the last 2 site finance reports with the Finance Manager; understand what is generated, when, and what culinary inputs are required.", relevance: "Head Chef must know which finance reports exist for this site and what their role is in producing accurate data for them.", question: null, source: "Monthly site finance report; Finance Manager" },

let currentRole = 'site_manager';
let checked = {};

function totalItems() {
  return roles[currentRole].reduce((sum, s) => sum + s.items.length, 0);
}

function checkedCount() {
  const prefix = currentRole + '_';
  return Object.keys(checked).filter(k => k.startsWith(prefix) && checked[k]).length;
}

function updateProgress() {
  const total = totalItems();
  const done = checkedCount();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = done + ' / ' + total + ' completed';
  roles[currentRole].forEach(sec => {
    const secDone = sec.items.filter((_, i) => checked[currentRole + '_' + sec.id + '_' + i]).length;
    const pill = document.getElementById('pill_' + sec.id);
    if (pill) pill.textContent = secDone + ' / ' + sec.items.length;
  });
}

function isUrl(str) { return str && (str.startsWith('http://') || str.startsWith('https://')); }

function render() {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  roles[currentRole].forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'sec_' + sec.id;
    const secDone = sec.items.filter((_, i) => checked[currentRole + '_' + sec.id + '_' + i]).length;
    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-header-left">
          <div class="section-icon" style="background:${sec.iconBg}">${sec.icon}</div>
          <div>
            <div class="section-title">${sec.title}</div>
            <div class="section-meta">${sec.titleHe}</div>
          </div>
        </div>
        <div class="section-right">
          <span class="section-progress-pill" id="pill_${sec.id}">${secDone} / ${sec.items.length}</span>
          <span class="chevron">⌄</span>
        </div>
      </div>
      <div class="section-body" id="body_${sec.id}"></div>
    `;
    const body = card.querySelector('.section-body');
    sec.items.forEach((item, i) => {
      const key = currentRole + '_' + sec.id + '_' + i;
      const isChecked = checked[key];
      const row = document.createElement('div');
      row.className = 'item-row' + (isChecked ? ' checked' : '');
      row.id = 'row_' + key;
      const hasDetails = item.how || item.question || item.source || item.relevance;
      row.innerHTML = `
        <div class="checkbox-wrap">
          <input type="checkbox" id="cb_${key}" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); toggleCheck('${key}')">
        </div>
        <div class="item-content">
          <div class="item-name">${item.name}</div>
          ${hasDetails ? `<button class="item-expand-btn" onclick="event.stopPropagation(); toggleDetails('${key}')">
            <span id="expand_icon_${key}">▶</span> <span id="expand_label_${key}">Show Details</span>
          </button>` : ''}
          <div class="item-details" id="details_${key}">
            ${item.how ? `<div class="detail-block"><div class="detail-label">How to Learn It</div>${item.how}</div>` : ''}
            ${item.relevance ? `<div class="detail-relevance-block"><div class="detail-label">Why This Matters</div>${item.relevance}</div>` : ''}
            ${item.question ? `<div class="detail-question-block"><div class="detail-label">Questions to Find Out</div>${item.question}</div>` : ''}
            ${item.source ? `<div class="detail-block"><div class="detail-label">Source / Document</div>${isUrl(item.source) ? `<a class="detail-link" href="${item.source}" target="_blank">Open Link ↗</a>` : item.source}</div>` : ''}
          </div>
        </div>
      `;
      body.appendChild(row);
    });
    container.appendChild(card);
  });
  updateProgress();
}

function switchRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleSection(id) {
  document.getElementById('sec_' + id).classList.toggle('open');
}

function toggleCheck(key) {
  checked[key] = !checked[key];
  const row = document.getElementById('row_' + key);
  checked[key] ? row.classList.add('checked') : row.classList.remove('checked');
  updateProgress();
}

function toggleDetails(key) {
  const details = document.getElementById('details_' + key);
  const icon = document.getElementById('expand_icon_' + key);
  const label = document.getElementById('expand_label_' + key);
  const isOpen = details.classList.contains('open');
  details.classList.toggle('open');
  icon.textContent = isOpen ? '▶' : '▼';
  label.textContent = isOpen ? 'Show Details' : 'Hide Details';
}

render();
</script>
